name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat / SwiftLint
        run: |
          brew update
          brew install swiftformat swiftlint

      - name: SwiftFormat lint
        run: swiftformat --lint PairShot

      - name: SwiftLint
        run: swiftlint --strict

  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Seed xcconfig from Sample (CI fallback)
        run: |
          cp PairShot/PairShot/Config/Sample.xcconfig PairShot/PairShot/Config/Debug.xcconfig
          cp PairShot/PairShot/Config/Sample.xcconfig PairShot/PairShot/Config/Release.xcconfig

      - name: Xcode build (Debug)
        run: |
          xcodebuild -project PairShot/PairShot.xcodeproj \
            -scheme PairShot \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            build

      - name: Xcode build (Release)
        run: |
          xcodebuild -project PairShot/PairShot.xcodeproj \
            -scheme PairShot \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -configuration Release \
            build
