# SwiftLint Configuration for PairShot
# Swift 6 / iOS 17+ / SwiftUI

# ────────────────────────────────────────────────
# Excluded Paths
# ────────────────────────────────────────────────
excluded:
  - DerivedData
  - .build
  - Packages
  - "*/DerivedData/*"
  - "**/.build/*"

# ────────────────────────────────────────────────
# Enabled Opt-In Rules
# ────────────────────────────────────────────────
opt_in_rules:
  # Code quality
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_assert
  - discouraged_none_name
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - expiring_todo
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - ibinspectable_in_extension
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_objc_type
  - literal_expression_end_indentation
  - local_doc_comment
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - nimble_operator
  - no_extension_access_modifier
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - orphaned_doc_comment
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - private_subject
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - raw_value_for_camel_cased_codable_enum
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_value_from_void_function
  - shorthand_optional_binding
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - strong_iboutlet
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

# ────────────────────────────────────────────────
# Disabled Rules (conflict with SwiftFormat or too strict)
# ────────────────────────────────────────────────
disabled_rules:
  # SwiftFormat handles these — avoid double-enforcement
  - trailing_whitespace
  - trailing_newline
  - opening_brace            # SwiftFormat: braces
  - closing_brace            # SwiftFormat: braces
  - colon                    # SwiftFormat: spaceAroundOperators
  - comma                    # SwiftFormat: spaceAroundCommas
  - operator_whitespace      # SwiftFormat: spaceAroundOperators
  - return_arrow_whitespace  # SwiftFormat: spaceAroundOperators
  - statement_position       # SwiftFormat: elseOnSameLine
  - multiline_parameters_brackets  # Can conflict with SwiftFormat's wrapArguments

  # SwiftFormat indentation conflict
  - switch_case_alignment    # SwiftFormat: indentcase
  - vertical_whitespace_between_cases  # SwiftFormat handles case spacing

  # Overly strict for SwiftUI / iOS patterns
  - todo                     # TODOs are tracked elsewhere
  - no_extension_access_modifier  # Conflicts with extension_access_modifier
  - required_deinit          # SwiftData @Model classes don't need explicit deinit
  - trailing_comma           # SwiftFormat handles this
  - type_contents_order      # Too strict for current project phase
  - modifier_order           # SwiftFormat handles modifier ordering

# ────────────────────────────────────────────────
# Rule Configuration
# ────────────────────────────────────────────────

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 3
    error: 5
  function_level:
    warning: 3
    error: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  allowed_symbols: ["_"]
  excluded:
    - id
    - x
    - y
    - z
    - dx
    - dy
    - dz
    - i
    - j
    - k
    - to
    - db

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 60
    error: 80

large_tuple:
  warning: 3
  error: 4

number_separator:
  minimum_length: 5

trailing_closure:
  only_single_muted_parameter: true

modifier_order:
  preferred_modifier_order:
    - override
    - acl
    - setterACL
    - dynamic
    - mutating
    - lazy
    - final
    - required
    - convenience
    - typeMethods
    - owned

# Allow @IBAction and @IBOutlet in extensions (UIKit compatibility)
ibinspectable_in_extension:
  severity: warning

force_unwrapping:
  severity: warning

implicit_return:
  included:
    - closure
    - getter
    - initializer

type_contents_order:
  order:
    - case
    - type_alias
    - associated_type
    - subtype
    - type_property
    - instance_property
    - ib_inspectable
    - ib_outlet
    - initializer
    - type_method
    - view_life_cycle_method
    - ib_action
    - other_method
    - subscript

# ────────────────────────────────────────────────
# Analyzer Rules (requires --fix or full build)
# ────────────────────────────────────────────────
analyzer_rules:
  - explicit_self
  - unused_declaration
  - unused_import
