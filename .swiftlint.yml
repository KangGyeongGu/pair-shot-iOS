# SwiftLint Configuration for PairShot
# Swift 6 / iOS 17+ / SwiftUI

# ────────────────────────────────────────────────
# Excluded Paths
# ────────────────────────────────────────────────
excluded:
  - DerivedData
  - .build
  - Packages
  - "*/DerivedData/*"
  - "**/.build/*"
  - .claude/_legacy
  - .claude/refs/sources

# ────────────────────────────────────────────────
# Enabled Opt-In Rules
# ────────────────────────────────────────────────
opt_in_rules:
  # Code quality
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_assert
  - discouraged_none_name
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - expiring_todo
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - function_default_parameter_at_end
  - ibinspectable_in_extension
  - identical_operands
  - implicit_return
  - implicit_optional_initialization
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_hashing
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - local_doc_comment
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - non_overridable_class_declaration
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - optional_enum_case_matching
  - orphaned_doc_comment
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_key_path
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - private_subject
  - prohibited_interface_builder
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_set_access_control
  - redundant_string_enum_value
  - redundant_type_annotation
  - return_value_from_void_function
  - shorthand_optional_binding
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - strong_iboutlet
  - superfluous_disable_command
  - toggle_bool
  - trailing_closure
  - type_contents_order
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

# ────────────────────────────────────────────────
# Disabled Rules (conflict with SwiftFormat or too strict)
# ────────────────────────────────────────────────
disabled_rules:
  # SwiftFormat handles these — avoid double-enforcement
  - trailing_whitespace
  - trailing_newline
  - opening_brace            # SwiftFormat: braces
  - closing_brace            # SwiftFormat: braces
  - colon                    # SwiftFormat: spaceAroundOperators
  - comma                    # SwiftFormat: spaceAroundCommas
  - return_arrow_whitespace  # SwiftFormat: spaceAroundOperators
  - statement_position       # SwiftFormat: elseOnSameLine
  - multiline_parameters_brackets  # Can conflict with SwiftFormat's wrapArguments
  - trailing_comma           # SwiftFormat: trailingCommas

  # Overly strict for SwiftUI / iOS patterns
  - todo                     # TODOs are tracked elsewhere
  - no_extension_access_modifier  # Conflicts with extension_access_modifier

# ────────────────────────────────────────────────
# Rule Configuration
# ────────────────────────────────────────────────

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 120

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 10
  error: 20
  ignores_case_statements: true

nesting:
  type_level:
    warning: 3
    error: 5
  function_level:
    warning: 3
    error: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - z
    - dx
    - dy
    - dz
    - i
    - j
    - k
    - to
    - db

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 60
    error: 80

large_tuple:
  warning: 3
  error: 4

number_separator:
  minimum_length: 5

trailing_closure:
  only_single_muted_parameter: true

modifier_order:
  severity: warning
  preferred_modifier_order:
    - override
    - acl
    - setterACL
    - dynamic
    - lazy
    - final
    - required
    - convenience
    - typeMethods

switch_case_alignment:
  indented_cases: true

type_contents_order:
  order:
    - case
    - type_alias
    - associated_type
    - subtype
    - type_property
    - instance_property
    - initializer
    - other_method
    - type_method
    - subscript

# Allow @IBAction and @IBOutlet in extensions (UIKit compatibility)
ibinspectable_in_extension:
  severity: warning

force_unwrapping:
  severity: warning

implicit_return:
  included:
    - closure
    - getter
    - initializer


# ────────────────────────────────────────────────
# Analyzer Rules (requires --fix or full build)
# ────────────────────────────────────────────────
analyzer_rules:
  - explicit_self
  - unused_declaration
  - unused_import

# ────────────────────────────────────────────────
# Custom Rules — Architecture Invariants
# ────────────────────────────────────────────────
custom_rules:
  no_arkit_import:
    name: "No ARKit import"
    regex: 'import\s+ARKit\b'
    message: "ARKit import is forbidden in PairShot"
    severity: error
    included: ".*\\.swift$"
  no_vision_auto_alignment:
    name: "No Vision auto-alignment"
    regex: 'VNTranslationalImageRegistration|VNFeaturePrint|AlignmentService|MatchingScoreService|AIAnalysisCoordinator|PositionMatchingService'
    message: "Vision auto-alignment patterns are forbidden"
    severity: error
    included: ".*\\.swift$"
  no_lidar_depth:
    name: "No LiDAR/Depth"
    regex: 'AVDepthData|builtInLiDARDepthCamera|DepthCaptureService'
    message: "LiDAR/Depth APIs are forbidden"
    severity: error
    included: ".*\\.swift$"
  no_auto_color_correction:
    name: "No auto color correction"
    regex: 'ColorCorrectionService|QualityCheckService|QualityIssue|LowLightManager'
    message: "Auto color correction patterns are forbidden"
    severity: error
    included: ".*\\.swift$"
  no_photo_swiftdata_model:
    name: "No Photo @Model"
    regex: '@Model\s+(public\s+|final\s+)*class\s+Photo\b'
    message: "Photo as @Model is forbidden; photos are file system objects"
    severity: error
    included: ".*\\.swift$"
